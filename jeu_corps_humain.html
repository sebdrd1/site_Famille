<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Il était une fois le Corps — Jeu Éducatif</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Atkinson Hyperlegible',system-ui,sans-serif;overflow:hidden}
#game-container{position:relative;max-width:100vw;max-height:100vh}
canvas{display:block;max-width:100%;max-height:100vh}
#loading{position:fixed;top:0;left:0;right:0;bottom:0;background:#1a1a2e;display:flex;align-items:center;justify-content:center;color:#fff;font-size:24px;z-index:999}
</style>
</head>
<body>
<div id="loading">Chargement...</div>
<div id="game-container"></div>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<script>
// Attendre que Phaser soit chargé
function initGame() {
  if (typeof Phaser === 'undefined') {
    setTimeout(initGame, 100);
    return;
  }

  document.getElementById('loading').style.display = 'none';

  var CONFIG = {
    type: Phaser.AUTO,
    width: 800,
    height: 600,
    parent: 'game-container',
    backgroundColor: '#1a1a2e',
    scale: {
      mode: Phaser.Scale.FIT,
      autoCenter: Phaser.Scale.CENTER_BOTH,
      min: { width: 320, height: 240 },
      max: { width: 1200, height: 900 }
    }
  };

  // ===== SCENE: BOOT =====
  class BootScene extends Phaser.Scene {
    constructor() { super({ key: 'BootScene' }); }
    create() {
      // Générer les textures procéduralement
      var g = this.make.graphics({ x: 0, y: 0, add: false });
      
      // Player
      g.clear();
      g.fillStyle(0x4488ff); g.fillRect(8, 8, 16, 20);
      g.fillStyle(0xffcc99); g.fillRect(10, 2, 12, 10);
      g.fillStyle(0x000000); g.fillRect(12, 5, 2, 2); g.fillRect(18, 5, 2, 2);
      g.fillStyle(0x336699); g.fillRect(10, 28, 5, 8); g.fillRect(17, 28, 5, 8);
      g.generateTexture('player', 32, 36);
      
      // Star
      g.clear();
      g.fillStyle(0xffdd44);
      var cx=16, cy=16, pts=[];
      for(var i=0;i<5;i++){
        var a=(i*72-90)*Math.PI/180;
        pts.push({x:cx+14*Math.cos(a),y:cy+14*Math.sin(a)});
        var a2=((i*72+36)-90)*Math.PI/180;
        pts.push({x:cx+6*Math.cos(a2),y:cy+6*Math.sin(a2)});
      }
      g.fillPoints(pts,true);
      g.generateTexture('star', 32, 32);
      
      // Particle
      g.clear();
      g.fillStyle(0xffffff); g.fillRect(0, 0, 4, 4);
      g.generateTexture('particle', 4, 4);
      
      g.destroy();
      
      this.scene.start('MenuScene');
    }
  }

  // ===== SCENE: MENU =====
  class MenuScene extends Phaser.Scene {
    constructor() { super({ key: 'MenuScene' }); }
    create() {
      var w = this.scale.width;
      var h = this.scale.height;
      
      // Background
      var bg = this.add.graphics();
      bg.fillGradientStyle(0x1a1a2e, 0x1a1a2e, 0x16213e, 0x0f3460, 1);
      bg.fillRect(0, 0, w, h);
      
      // Particules flottantes
      for(var i=0;i<20;i++){
        var p = this.add.image(
          Phaser.Math.Between(0, w),
          Phaser.Math.Between(0, h),
          'particle'
        ).setAlpha(0.3);
        this.tweens.add({
          targets: p, y: p.y - 50, alpha: 0,
          duration: Phaser.Math.Between(3000, 6000),
          repeat: -1, yoyo: true
        });
      }
      
      // Titre
      this.add.text(w/2, 100, 'Il était une fois', {
        fontSize: '36px', fontFamily: 'Atkinson Hyperlegible, system-ui',
        color: '#ffdd44', fontStyle: 'bold'
      }).setOrigin(0.5);
      
      this.add.text(w/2, 150, 'LE CORPS', {
        fontSize: '48px', fontFamily: 'Atkinson Hyperlegible, system-ui',
        color: '#4488ff', fontStyle: 'bold'
      }).setOrigin(0.5);
      
      this.add.text(w/2, 200, 'Jeu Éducatif — Version Test', {
        fontSize: '16px', fontFamily: 'Atkinson Hyperlegible, system-ui',
        color: '#8888aa'
      }).setOrigin(0.5);
      
      // Bouton Léana
      this.createButton(w/2 - 120, 300, 'Léana\nGrande Section', 0xee82ee, function() {
        this.scene.start('ZoneSelectScene');
      }.bind(this));
      
      // Bouton Mathias
      this.createButton(w/2 + 120, 300, 'Mathias\nCE2 ULIS', 0xd62828, function() {
        this.scene.start('ZoneSelectScene');
      }.bind(this));
      
      // Footer
      this.add.text(w/2, h - 30, 'Version test — Plus de contenu bientôt !', {
        fontSize: '14px', fontFamily: 'Atkinson Hyperlegible, system-ui',
        color: '#666688'
      }).setOrigin(0.5);
    }
    
    createButton(x, y, text, color, callback) {
      var container = this.add.container(x, y);
      var bg = this.add.graphics();
      bg.fillStyle(color); bg.fillRoundedRect(-90, -35, 180, 70, 14);
      bg.fillStyle(0xffffff, 0.15); bg.fillRoundedRect(-88, -33, 176, 33, 12);
      var label = this.add.text(0, 0, text, {
        fontSize: '16px', fontFamily: 'Atkinson Hyperlegible, system-ui',
        color: '#ffffff', fontStyle: 'bold', align: 'center'
      }).setOrigin(0.5);
      container.add([bg, label]);
      container.setSize(180, 70);
      container.setInteractive({ useHandCursor: true });
      container.on('pointerdown', callback);
      return container;
    }
  }

  // ===== SCENE: ZONE SELECT =====
  class ZoneSelectScene extends Phaser.Scene {
    constructor() { super({ key: 'ZoneSelectScene' }); }
    create() {
      var w = this.scale.width;
      var h = this.scale.height;
      
      this.add.text(w/2, 40, 'Choisis une zone du corps', {
        fontSize: '28px', fontFamily: 'Atkinson Hyperlegible, system-ui',
        color: '#ffffff'
      }).setOrigin(0.5);
      
      var zones = [
        {name: 'Cerveau', icon: '🧠', color: 0xff9999},
        {name: 'Cœur', icon: '❤️', color: 0xff4444},
        {name: 'Poumons', icon: '🫁', color: 0xffaacc},
        {name: 'Estomac', icon: '🫃', color: 0xffcc44},
        {name: 'Os', icon: '🦴', color: 0xeeeeee},
        {name: 'Muscles', icon: '💪', color: 0xcc4444}
      ];
      
      var cols = 3;
      var rows = 2;
      var btnW = 180;
      var btnH = 100;
      var startX = w/2 - (cols-1) * (btnW + 20) / 2;
      var startY = 150;
      
      for(var i = 0; i < zones.length; i++){
        var col = i % cols;
        var row = Math.floor(i / cols);
        var zx = startX + col * (btnW + 20);
        var zy = startY + row * (btnH + 20);
        var zone = zones[i];
        
        var btn = this.add.graphics();
        btn.fillStyle(zone.color); btn.fillRoundedRect(zx, zy, btnW, btnH, 12);
        btn.fillStyle(0xffffff, 0.2); btn.fillRoundedRect(zx+2, zy+2, btnW-4, btnH/2, 10);
        
        this.add.text(zx + btnW/2, zy + 30, zone.icon, {fontSize: '32px'}).setOrigin(0.5);
        this.add.text(zx + btnW/2, zy + 65, zone.name, {
          fontSize: '16px', fontFamily: 'Atkinson Hyperlegible, system-ui',
          color: '#ffffff', fontStyle: 'bold'
        }).setOrigin(0.5);
        
        var zoneBtn = this.add.zone(zx + btnW/2, zy + btnH/2, btnW, btnH).setInteractive({useHandCursor: true});
        zoneBtn.on('pointerdown', function(z) {
          return function() {
            this.scene.start('GameScene', {zone: z.name});
          };
        }(zone.name));
      }
      
      // Bouton retour
      this.createButton(w/2, h - 50, '← Retour', 0x444488, function() {
        this.scene.start('MenuScene');
      }.bind(this));
    }
    
    createButton(x, y, text, color, callback) {
      var container = this.add.container(x, y);
      var bg = this.add.graphics();
      bg.fillStyle(color); bg.fillRoundedRect(-80, -20, 160, 40, 10);
      var label = this.add.text(0, 0, text, {
        fontSize: '16px', fontFamily: 'Atkinson Hyperlegible, system-ui',
        color: '#ffffff', fontStyle: 'bold'
      }).setOrigin(0.5);
      container.add([bg, label]);
      container.setSize(160, 40);
      container.setInteractive({ useHandCursor: true });
      container.on('pointerdown', callback);
      return container;
    }
  }

  // ===== SCENE: GAME =====
  class GameScene extends Phaser.Scene {
    constructor() { super({ key: 'GameScene' }); }
    init(data) {
      this.zoneName = data.zone || 'Cerveau';
    }
    create() {
      var w = this.scale.width;
      var h = this.scale.height;
      
      // Background
      var bg = this.add.graphics();
      bg.fillGradientStyle(0x1a1a2e, 0x16213e, 0x0f3460, 0x1a1a2e, 1);
      bg.fillRect(0, 0, w, h);
      
      // Titre zone
      this.add.text(w/2, 30, this.zoneName, {
        fontSize: '32px', fontFamily: 'Atkinson Hyperlegible, system-ui',
        color: '#ffdd44', fontStyle: 'bold'
      }).setOrigin(0.5);
      
      // Zone de jeu
      this.add.text(w/2, h/2, '🎮 Zone de jeu: ' + this.zoneName + '\n\n(En construction...)', {
        fontSize: '20px', fontFamily: 'Atkinson Hyperlegible, system-ui',
        color: '#ffffff', align: 'center'
      }).setOrigin(0.5);
      
      // Bouton retour
      this.createButton(w/2, h - 50, '← Retour aux zones', 0x444488, function() {
        this.scene.start('ZoneSelectScene');
      }.bind(this));
    }
    
    createButton(x, y, text, color, callback) {
      var container = this.add.container(x, y);
      var bg = this.add.graphics();
      bg.fillStyle(color); bg.fillRoundedRect(-100, -20, 200, 40, 10);
      var label = this.add.text(0, 0, text, {
        fontSize: '16px', fontFamily: 'Atkinson Hyperlegible, system-ui',
        color: '#ffffff', fontStyle: 'bold'
      }).setOrigin(0.5);
      container.add([bg, label]);
      container.setSize(200, 40);
      container.setInteractive({ useHandCursor: true });
      container.on('pointerdown', callback);
      return container;
    }
  }

  // ===== DÉMARRER LE JEU =====
  var game = new Phaser.Game(CONFIG);
  game.scene.add('BootScene', BootScene);
  game.scene.add('MenuScene', MenuScene);
  game.scene.add('ZoneSelectScene', ZoneSelectScene);
  game.scene.add('GameScene', GameScene);
  game.scene.start('BootScene');
}

// Démarrer
initGame();
</script>
</body>
</html>
