<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="phaser.min.js"></script>
</head>
<body style="margin:0;background:#1a1a2e;color:#fff;font-family:sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh">
<div id="game"></div>
<script>
document.body.insertAdjacentHTML('afterbegin', '<div id="debug" style="position:fixed;top:0;left:0;background:#000;color:#0f0;padding:10px;z-index:9999;font-family:monospace;font-size:12px">Loading...</div>');
document.getElementById('debug').textContent = 'Phaser: ' + (typeof Phaser) + ' | VERSION: ' + (Phaser.VERSION || 'N/A');

var config = {
  type: Phaser.AUTO,
  width: 400,
  height: 300,
  parent: 'game',
  scene: {
    create: function() {
      this.add.text(200, 150, 'PHASER OK! v' + Phaser.VERSION, {fontSize: '20px', color: '#0f0'}).setOrigin(0.5);
      document.getElementById('debug').textContent = 'SUCCESS! Phaser ' + Phaser.VERSION;
    }
  }
};

try {
  var game = new Phaser.Game(config);
  document.getElementById('debug').textContent += ' | Game: OK';
} catch(e) {
  document.getElementById('debug').textContent += ' | ERROR: ' + e.message;
}
</script>
</body>
</html>
