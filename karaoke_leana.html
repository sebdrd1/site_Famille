<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Karaoké — Léana</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--pink:#ff69b4;--violet:#9b59b6;--bg:#1a0a2e;--card:rgba(255,255,255,0.08);--text:#f0e6ff;--accent:#ffd700}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;touch-action:manipulation}
header{background:linear-gradient(135deg,var(--pink),var(--violet));padding:16px;text-align:center;position:sticky;top:0;z-index:100}
header h1{font-size:22px;color:#fff}
header p{font-size:12px;opacity:0.8;margin-top:4px}
.back-btn{position:absolute;left:12px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.2);border:none;color:#fff;padding:8px 14px;border-radius:20px;font-size:14px;cursor:pointer}
.container{padding:16px;max-width:800px;margin:0 auto;padding-bottom:100px}
.comptine-card{background:var(--card);border-radius:16px;padding:20px;margin-bottom:16px;border:2px solid rgba(255,105,180,0.3);cursor:pointer;transition:all 0.2s}
.comptine-card:active{transform:scale(0.98)}
.comptine-card.active{border-color:var(--accent);background:rgba(255,215,0,0.1)}
.comptine-title{font-size:20px;font-weight:bold;color:var(--accent);margin-bottom:4px}
.comptine-emoji{font-size:32px;margin-bottom:8px}
.comptine-preview{font-size:14px;opacity:0.7;font-style:italic}
.lyrics{display:none;padding:20px;background:rgba(0,0,0,0.3);border-radius:12px;margin-top:12px;font-size:22px;line-height:2.2;text-align:center}
.lyrics.show{display:block}
.lyrics .line{padding:6px 0;transition:all 0.3s;opacity:0.5}
.lyrics .line.active{color:var(--accent);font-size:28px;font-weight:bold;text-shadow:0 0 10px var(--accent);opacity:1}
.lyrics .line.done{opacity:0.8}
.controls{display:flex;gap:12px;justify-content:center;margin-top:16px;flex-wrap:wrap}
.ctrl-btn{padding:14px 28px;border:none;border-radius:25px;font-size:18px;font-weight:bold;cursor:pointer;transition:all 0.2s;color:#fff}
.ctrl-btn:active{transform:scale(0.95)}
.btn-play{background:linear-gradient(135deg,#2ecc71,#27ae60)}
.btn-stop{background:linear-gradient(135deg,#e74c3c,#c0392b)}
.btn-sing{background:linear-gradient(135deg,var(--pink),var(--violet))}
.btn-back{background:linear-gradient(135deg,#3498db,#2980b9)}
.status-bar{text-align:center;padding:10px;font-size:16px;color:var(--accent);min-height:40px}

/* Voice selector */
.voice-selector{display:flex;gap:8px;justify-content:center;margin-bottom:12px;flex-wrap:wrap}
.voice-btn{padding:8px 16px;border:2px solid rgba(255,255,255,0.15);border-radius:16px;background:var(--card);color:#fff;font-size:13px;cursor:pointer;transition:all 0.2s}
.voice-btn:active{transform:scale(0.95)}
.voice-btn.sel{border-color:var(--accent);background:rgba(255,215,0,0.15)}
.voice-btn .voice-icon{font-size:20px}
</style>
</head>
<body>
<header>
  <button class="back-btn" onclick="window.location.href='dashboard_leana.html'">← Retour</button>
  <h1>🎤 Karaoké</h1>
  <p>Chante avec Léana !</p>
</header>

<!-- SÉLECTEUR DE VOIX -->
<div class="voice-selector" id="voiceSelector"></div>

<div class="container" id="comptine-list"></div>
<div class="status-bar" id="status">Choisis une comptine !</div>
<div class="controls" id="controls" style="display:none">
  <button class="ctrl-btn btn-play" onclick="startKaraoke()">▶ Écouter</button>
  <button class="ctrl-btn btn-sing" onclick="singAlong()">🎤 Chanter</button>
  <button class="ctrl-btn btn-stop" onclick="stopKaraoke()">⏹ Stop</button>
  <button class="ctrl-btn btn-back" onclick="backToMenu()">← Comptines</button>
</div>

<script>

  {title:"Petit escargot",emoji:"🐌",lyrics:[

// ===== SYSTÈME VOCAL AMÉLIORÉ =====
var voiceElsa=null;  // Voix féminine (Léana)
var voiceTony=null;   // Voix masculine (Mathias)
var voiceQueue=[];
var isSpeaking=false;

// Trouver les meilleures voix
function findVoices(){
  if(!('speechSynthesis'in window))return;
  var voices=speechSynthesis.getVoices();
  if(voices.length===0){
    speechSynthesis.onvoiceschanged=function(){findVoices();};
    return;
  }
  
  var selector=document.getElementById('voiceSelector');
  selector.innerHTML='';
  
  // Chercher voix féminine FR (pour Léana/Elsa)
  var frFem=voices.filter(function(v){return v.lang.indexOf('fr')===0&&v.name.toLowerCase().match(/femme|female|féminin|google|hortense|julie|pauline|denise|sophie|yolaine|amelie|marion|celine|camille);});
  if(!frFem.length) frFem=voices.filter(function(v){return v.lang.indexOf('fr')===0&&v.voiceURI&&v.voiceURI.toLowerCase().match(/female|femme|fem);});
  
  // Chercher voix masculine FR (pour Mathias/Tony)
  var frMasc=voices.filter(function(v){return v.lang.indexOf('fr')===0&&v.name.toLowerCase().match(/homme|male|masculin|thomas|pierro|pierre|jacques|antoine|nicolas|daniel|bertrand|maxime|hugo|xavier|rene);});
  
  var frAll=voices.filter(function(v){return v.lang.indexOf('fr')===0;});
  
  // Créer les boutons de voix
  var voiceProfiles=[
    {id:'elsa',name:'Elsa',icon:'👸',type:'fem',desc:'Voix douce et claire'},
    {id:'tony',name:'Tony',icon:'🤵',type:'masc',desc:'Voix grave et posée'},
    {id:'robot',name:'Robot',icon:'🤖',type:'default',desc:'Voix par défaut'}
  ];
  
  var selectedVoice='elsa'; // Par défaut pour Léana
  
  voiceProfiles.forEach(function(vp){
    var btn=document.createElement('div');
    btn.className='voice-btn'+(vp.id===selectedVoice?' sel':'');
    btn.innerHTML='<span class="voice-icon">'+vp.icon+'</span> '+vp.name;
    btn.title=vp.desc;
    btn.onclick=function(){
      document.querySelectorAll('.voice-btn').forEach(function(b){b.classList.remove('sel');});
      btn.classList.add('sel');
      selectedVoice=vp.id;
    };
    selector.appendChild(btn);
  });
  
  // Stocker les références
  if(frFem.length) voiceElsa=frFem[0];
  if(frMasc.length) voiceTony=frMasc[0];
  if(frAll.length&&!voiceElsa) voiceElsa=frAll[0];
  if(frAll.length>1&&!voiceTony) voiceTony=frAll[1];
}

// Parler avec la bonne voix et prononciation correcte
function speak(text,callback){
  if(!('speechSynthesis'in window)){
    if(callback)callback();
    return;
  }
  
  // Fix prononcitation pour éviter l'épellation
  text=fixPronunciation(text);
  
  var u=new SpeechSynthesisUtterance(text);
  u.lang='fr-FR';
  u.rate=0.82;
  
  // Sélectionner la voix
  var voices=speechSynthesis.getVoices();
  if(voices.length===0){
    speechSynthesis.onvoiceschanged=function(){speak(text,callback);};
    return;
  }
  
  var selectedVoice=document.querySelector('.voice-btn.sel');
  var voiceId=selectedVoice?selectedVoice.textContent.trim().toLowerCase():'elsa';
  
  // Utiliser la voix Elsa ou la meilleure voix FR féminine
  var targetVoice=null;
  if(voiceElsa&&voiceId==='elsa') targetVoice=voiceElsa;
  
  if(targetVoice) u.voice=targetVoice;
  else {
    // Fallback: trouver la meilleure voix FR
    var frVoices=voices.filter(function(v){return v.lang==='fr-FR'||v.lang==='fr-FR';});
    var googleFR=frVoices.find(function(v){return v.name.toLowerCase().match(/google|microsoft\s+(fr|fran|hortense|julie|thomas|pauline|denise|sophie);});
    if(googleFR) u.voice=googleFR;
    else if(frVoices.length) u.voice=frVoices[0];
  }
  
  u.pitch=voiceElsa?1.15:1.0; // Léger aigu pour Elsa
  u.rate=0.88; // Un peu plus lent pour les comptines
  
  u.onend=function(){
    if(callback)callback();
    processQueue();
  };
  u.onerror=function(){
    if(callback)callback();
    processQueue();
  };
  
  isSpeaking=true;
  speechSynthesis.speak(u);
}

function processQueue(){
  if(voiceQueue.length===0){isSpeaking=false;return}
  var item=voiceQueue.shift();
  speak(item.text,item.cb);
}

function stopSpeech(){
  voiceQueue=[];
  isSpeaking=false;
  speechSynthesis.cancel();
}

// Fixer la prononciation pour éviter les épellation
function fixPronunciation(text){
  // Remplacer les abréviations qui font épeler
  var fixes=[
    [/cro cro cro/gi,'kro kro kro'],
    [/ding ding dong/gi,'ding ding dong'],
    [/sur le pont/gi,'syr lõ põ'],
    [/les beaux messieurs/gi,'lé bō masyø'],
    [/il pleut bergère/gi,'il plø bɛʁʒɛʁ'],
    [/promenons-nous/gi,'pʁɔmənõ nu'],
    [/c'est la comptine/gi,'sɛ lə kɔ̃tin'],
    [/jamais je ne t'oublierai/gi,'ʒamɛ ʒə nə tubliʁe']
  ];
  fixes.forEach(function(f){text=text.replace(f[0],f[1]);});
  return text;
}

// ===== AUDIO NOTES (musique de fond simplifiée) =====
var _audioCtx=null;
function getAudioCtx(){
  if(!_audioCtx) _audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(_audioCtx.state==='suspended') _audioCtx.resume();
  return _audioCtx;
}

// ===== KARAOKÉ =====
var currentComptine=null;
var currentLine=0;
var karaokeTimer=null;
var isPlaying=false;

function renderList(){
  var list=document.getElementById('comptine-list');
  list.innerHTML='';
  comptines.forEach(function(c,idx){
    var card=document.createElement('div');
    card.className='comptine-card';
    card.innerHTML='<div class="comptine-emoji">'+c.emoji+'</div><div class="comptine-title">'+c.title+'</div><div class="comptine-preview">'+c.lyrics[0]+'...</div>';
    card.onclick=function(){selectComptine(idx);};
    list.appendChild(card);
  });
}

function selectComptine(idx){
  currentComptine=comptines[idx];
  currentLine=0;
  isPlaying=false;
  if(karaokeTimer){clearTimeout(karaokeTimer);karaokeTimer=null;}
  
  var list=document.getElementById('comptine-list');
  list.innerHTML='';
  
  var card=document.createElement('div');
  card.className='comptine-card active';
  card.innerHTML='<div class="comptine-emoji">'+currentComptine.emoji+'</div><div class="comptine-title">'+currentComptine.title+'</div>';
  list.appendChild(card);
  
  var lyricsDiv=document.createElement('div');
  lyricsDiv.className='lyrics show';
  lyricsDiv.id='lyrics';
  var html='';
  for(var i=0;i<currentComptine.lyrics.length;i++){
    html+='<div class="line" id="line'+i+'">'+currentComptine.lyrics[i]+'</div>';
  }
  lyricsDiv.innerHTML=html;
  list.appendChild(lyricsDiv);
  
  document.getElementById('controls').style.display='flex';
  document.getElementById('status').textContent='Appuie sur ▶ pour écouter !';
  
  // Annonce avec la bonne voix
  setTimeout(function(){
    speak("C'est la comptine "+currentComptine.title+" !");
  },300);
}

function highlightLine(idx){
  for(var i=0;i<currentComptine.lyrics.length;i++){
    var el=document.getElementById('line'+i);
    if(!el)continue;
    el.className='line';
    if(i===idx) el.className='line active';
    else if(i<idx) el.className='line done';
  }
}

function startKaraoke(){
  if(!currentComptine)return;
  stopKaraoke();
  isPlaying=true;
  currentLine=0;
  document.getElementById('status').textContent='🎵 Écoute et regarde les paroles...';
  
  function sayNext(){
    if(!isPlaying||currentLine>=currentComptine.lyrics.length){
      isPlaying=false;
      document.getElementById('status').textContent='✅ Terminé !';
      speak("C'est fini ! Tu veux recommencer ?");
      highlightLine(-1);
      return;
    }
    highlightLine(currentLine);
    document.getElementById('line'+currentLine).scrollIntoView({behavior:'smooth',block:'center'});
    
    speak(currentComptine.lyrics[currentLine],function(){
      currentLine++;
      if(isPlaying) karaokeTimer=setTimeout(sayNext,600);
    });
  }
  sayNext();
}

function singAlong(){
  if(!currentComptine)return;
  stopKaraoke();
  isPlaying=true;
  currentLine=0;
  document.getElementById('status').textContent='🎤 À toi de chanter !';
  
  function showNext(){
    if(!isPlaying||currentLine>=currentComptine.lyrics.length){
      isPlaying=false;
      document.getElementById('status').textContent='🎉 Bravo !';
      speak("Bravo ! Tu veux recommencer ?");
      highlightLine(-1);
      return;
    }
    highlightLine(currentLine);
    document.getElementById('line'+currentLine).scrollIntoView({behavior:'smooth',block:'center'});
    currentLine++;
    karaokeTimer=setTimeout(showNext,3500);
  }
  showNext();
}

function stopKaraoke(){
  isPlaying=false;
  stopSpeech();
  if(karaokeTimer){clearTimeout(karaokeTimer);karaokeTimer=null;}
  document.getElementById('status').textContent='⏹ Arrêté';
}

function backToMenu(){
  stopKaraoke();
  renderList();
  document.getElementById('controls').style.display='none';
  document.getElementById('status').textContent='Choisis une comptine !';
}

// ===== INIT =====
findVoices();
renderList();
</script>
