<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Studio Avatar — Famille</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0f0f23;--card:rgba(255,255,255,0.06);--text:#e8e8f0;--accent:#ffd700;--green:#2ecc71;--blue:#3498db;--purple:#9b59b6;--red:#e74c3c;--orange:#e67e22;--pink:#ff69b4}
body{font-family:'Atkinson Hyperlegible',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;touch-action:manipulation}
header{background:linear-gradient(135deg,#1a1a3e,#2d1b69);padding:16px;text-align:center;position:sticky;top:0;z-index:100}
header h1{font-size:22px;color:var(--accent)}
.back-btn{position:absolute;left:12px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.15);border:none;color:#fff;padding:8px 14px;border-radius:20px;font-size:14px;cursor:pointer}
.container{padding:16px;max-width:800px;margin:0 auto;padding-bottom:120px}

/* Preview */
.preview-box{background:var(--card);border-radius:20px;padding:24px;margin-bottom:16px;text-align:center;min-height:220px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.preview-box img{max-width:180px;max-height:180px;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,0.3)}
.preview-placeholder{font-size:64px;margin-bottom:8px}
.preview-label{font-size:18px;font-weight:bold;color:var(--accent);margin-top:12px}
.preview-sub{font-size:13px;opacity:0.6;margin-top:4px}

/* Input */
.input-row{display:flex;gap:8px;margin-bottom:12px}
.input-row input{flex:1;padding:14px;border:2px solid rgba(255,255,255,0.15);border-radius:12px;background:var(--card);color:#fff;font-size:16px;outline:none}
.input-row input:focus{border-color:var(--accent)}
.input-row button{padding:14px 20px;border:none;border-radius:12px;background:var(--accent);color:#000;font-size:14px;font-weight:bold;cursor:pointer}
.input-row button:active{transform:scale(0.95)}

/* Colors */
.color-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;justify-content:center}
.color-btn{width:40px;height:40px;border-radius:50%;border:3px solid rgba(255,255,255,0.2);cursor:pointer;transition:all 0.2s}
.color-btn:active{transform:scale(0.9)}
.color-btn.sel{border-color:#fff;box-shadow:0 0 12px rgba(255,255,255,0.4)}

/* Styles */
.style-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px;margin-bottom:16px}
.style-card{padding:8px;border:2px solid rgba(255,255,255,0.1);border-radius:12px;background:var(--card);text-align:center;cursor:pointer;transition:all 0.2s}
.style-card:active{transform:scale(0.95)}
.style-card.sel{border-color:var(--accent);background:rgba(255,215,0,0.1)}
.style-card img{width:48px;height:48px;border-radius:8px;background:#fff}
.style-card .sn{font-size:10px;margin-top:4px;opacity:0.7;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Actions */
.actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:16px}
.act-btn{padding:14px 22px;border:none;border-radius:25px;font-size:15px;font-weight:bold;cursor:pointer;color:#fff;transition:all 0.2s}
.act-btn:active{transform:scale(0.95)}
.btn-rand{background:linear-gradient(135deg,var(--purple),#8e44ad)}
.btn-voice{background:linear-gradient(135deg,var(--pink),#e91e63)}
.btn-dl{background:linear-gradient(135deg,var(--blue),#2980b9)}
.btn-save{background:linear-gradient(135deg,var(--green),#27ae60)}

/* Toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--card);border:2px solid var(--accent);color:#fff;padding:12px 24px;border-radius:20px;font-size:14px;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>
<header>
  <button class="back-btn" onclick="window.location.href='index.html'">← Retour</button>
  <h1>🎨 Studio Avatar</h1>
</header>
<div class="container">

  <!-- PRÉVISUALISATION -->
  <div class="preview-box" id="previewBox">
    <div class="preview-placeholder" id="prevPh">👤</div>
    <img id="prevImg" style="display:none" alt="Avatar">
    <div class="preview-label" id="prevLabel">Entre ton nom !</div>
    <div class="preview-sub" id="prevSub">Choisis un style et une couleur</div>
  </div>

  <!-- NOM -->
  <div class="input-row">
    <input type="text" id="nameInput" placeholder="Ton nom (ex: Léana, Mathias...)" oninput="debouncedUpdate()">
    <button onclick="generate()">✨ Générer</button>
  </div>

  <!-- COULEURS -->
  <div class="color-row" id="colorRow"></div>

  <!-- STYLES -->
  <div class="style-grid" id="styleGrid"></div>

  <!-- ACTIONS -->
  <div class="actions">
    <button class="act-btn btn-rand" onclick="randomAll()">🎲 Aléatoire</button>
    <button class="act-btn btn-voice" onclick="describe()">🔊 Décrire</button>
    <button class="act-btn btn-dl" onclick="downloadPNG()">💾 Télécharger</button>
    <button class="act-btn btn-save" onclick="saveIt()">✅ Sauvegarder</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== DATA =====
var STYLES=[
  'pixel-art','adventurer','bottts','fun-emoji','open-peeps','notionists',
  'avataaars','big-ears','big-smile','croodles','lorelei','micah','miniavs',
  'personas','thumbs','identicon','initials','rings','shapes','triangles',
  'glass','glyphs','icons','initial-face','stripes','disco','dylan',
  'adventurer-neutral','avataaars-neutral','big-ears-neutral','bottts-neutral',
  'croodles-neutral','lorelei-neutral','notionists-neutral','pixel-art-neutral','toon-head'
];
var COLORS=[
  {hex:'ffd700',label:'Or'},{hex:'ff69b4',label:'Rose'},{hex:'4488ff',label:'Bleu'},
  {hex:'2ecc71',label:'Vert'},{hex:'e74c3c',label:'Rouge'},{hex:'9b59b6',label:'Violet'},
  {hex:'1abc9c',label:'Turquoise'},{hex:'e67e22',label:'Orange'},{hex:'ffffff',label:'Blanc'},
  {'hex':'333333',label:'Noir'},{hex:'f39c12',label:'Ambre'},{hex:'1a1a2e',label:'Nuit'}
];
var curStyle='pixel-art';
var curColor='ffd700';
var curName='';
var debounceTimer=null;

// ===== INIT =====
function init(){
  // Couleurs
  var row=document.getElementById('colorRow');
  for(var i=0;i<COLORS.length;i++){
    var c=COLORS[i];
    var b=document.createElement('div');
    b.className='color-btn'+(c.hex===curColor?' sel':'');
    b.style.background='#'+c.hex;
    b.title=c.label;
    (function(hex){b.onclick=function(){setColor(hex);};})(c.hex);
    row.appendChild(b);
  }
  // Styles
  renderStyles();
  // Charger sauvegarde
  loadSaved();
  // Générer premier avatar
  document.getElementById('nameInput').value='Famille';
  generate();
}

function renderStyles(){
  var grid=document.getElementById('styleGrid');
  grid.innerHTML='';
  for(var i=0;i<STYLES.length;i++){
    var s=STYLES[i];
    var card=document.createElement('div');
    card.className='style-card'+(s===curStyle?' sel':'');
    card.innerHTML='<img src="https://api.dicebear.com/9.x/'+s+'/svg?seed=ok&size=48&backgroundColor='+curColor+'" loading="lazy"><div class="sn">'+s+'</div>';
    (function(style){card.onclick=function(){setStyle(style);};})(s);
    grid.appendChild(card);
  }
}

// ===== ACTIONS =====
function setColor(hex){
  curColor=hex;
  document.querySelectorAll('.color-btn').forEach(function(b){b.classList.remove('sel');});
  event.target.classList.add('sel');
  renderStyles();
  generate();
}

function setStyle(style){
  curStyle=style;
  document.querySelectorAll('.style-card').forEach(function(c){c.classList.remove('sel');});
  event.currentTarget.classList.add('sel');
  generate();
}

function generate(){
  var name=document.getElementById('nameInput').value.trim()||'Avatar';
  curName=name;
  var url='https://api.dicebear.com/9.x/'+curStyle+'/svg?seed='+encodeURIComponent(name)+'&backgroundColor='+curColor+'&size=256';
  
  var ph=document.getElementById('prevPh');
  var img=document.getElementById('prevImg');
  img.src=url;
  img.style.display='block';
  ph.style.display='none';
  img.onload=function(){
    document.getElementById('prevLabel').textContent=name;
    document.getElementById('prevSub').textContent='Style: '+curStyle+' | Couleur: #'+curColor;
  };
  img.onerror=function(){
    showToast('⚠️ Erreur de chargement — réessaie');
  };
}

function debouncedUpdate(){
  clearTimeout(debounceTimer);
  debounceTimer=setTimeout(function(){generate();},500);
}

function randomAll(){
  var names=['Léana','Mathias','Élodie','Sébastien','Luna','Max','Zoé','Leo','Mia','Noah','Charlie','Jade','Lou','Emma','Hugo'];
  var name=names[Math.floor(Math.random()*names.length)];
  document.getElementById('nameInput').value=name;
  curStyle=STYLES[Math.floor(Math.random()*STYLES.length)];
  curColor=COLORS[Math.floor(Math.random()*COLORS.length)].hex;
  document.querySelectorAll('.color-btn').forEach(function(b){b.classList.toggle('sel',b.style.background==='#'+curColor);});
  renderStyles();
  generate();
  speak('Voici un avatar aléatoire pour '+name+' !');
}

function describe(){
  if(!curName){showToast('⚠️ Entre d\'abord un nom');return;}
  var styleFr={
    'pixel-art':'pixel art','adventurer':'aventurier','bottts':'robot',
    'fun-emoji':'emoji','open-peeps':'personnage','notionists':'notion',
    'avataaars':'avatar','big-ears':'grandes oreilles','big-smile':'grand sourire',
    'croodles':'croodles','lorelei':'lorelei','micah':'micah','miniavs':'mini-avatars',
    'personas':'personas','thumbs':'pouces','identicon':'identicon','initials':'initiales'
  };
  var s=styleFr[curStyle]||curStyle;
  speak('Voici l\'avatar de '+name+' dans le style '+s+'. Appuie sur télécharger pour sauvegarder.');
}

function downloadPNG(){
  var img=document.getElementById('prevImg');
  if(!img.src||img.style.display==='none'){showToast('⚠️ Génère d\'abord un avatar');return;}
  
  // Convertir SVG en PNG via canvas
  var canvas=document.createElement('canvas');
  canvas.width=512;canvas.height=512;
  var ctx=canvas.getContext('2d');
  var tmp=new Image();
  tmp.crossOrigin='anonymous';
  tmp.onload=function(){
    ctx.drawImage(tmp,0,0,512,512);
    var a=document.createElement('a');
    a.download='avatar-'+curName.replace(/\s+/g,'-')+'.png';
    a.href=canvas.toDataURL('image/png');
    a.click();
    showToast('✅ Avatar téléchargé !');
    speak('Avatar téléchargé !');
  };
  tmp.src=img.src;
}

function saveIt(){
  if(!curName){showToast('⚠️ Entre d\'abord un nom');return;}
  var data={name:curName,style:curStyle,color:curColor};
  try{
    localStorage.setItem('savedAvatar',JSON.stringify(data));
    showToast('✅ Sauvegardé !');
    speak('Avatar sauvegardé !');
  }catch(e){
    showToast('⚠️ Impossible de sauvegarder');
  }
}

function loadSaved(){
  try{
    var d=JSON.parse(localStorage.getItem('savedAvatar'));
    if(d){
      document.getElementById('nameInput').value=d.name||'';
      curStyle=d.style||'pixel-art';
      curColor=d.color||'ffd700';
    }
  }catch(e){}
}

// ===== SPEECH =====
function speak(text){
  if(!('speechSynthesis'in window))return;
  speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(text);
  u.lang='fr-FR';u.rate=0.9;u.pitch=1.1;
  speechSynthesis.speak(u);
}

// ===== TOAST =====
function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2500);
}

// ===== START =====
init();
</script>
</body>
</html>
